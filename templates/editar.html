<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar</title>
<style>
body { font-family: Arial; background: #f4f6f9; }
.container { max-width: 500px; margin:auto; }
.card { background:white; padding:15px; border-radius:10px; }
input { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:10px; background:#2c7be5; color:white; }
</style>
</head>

<body>

<div class="container">
<div class="card">

<h3>Editar</h3>

<form method="post">
<input name="piloto" value="{{ entrega[1] }}">
<input name="acompanhante" value="{{ entrega[2] }}">
<input name="ponto" value="{{ entrega[3] }}">
<input type="time" name="retirada" value="{{ entrega[4] }}">
<input type="time" name="finalizacao" value="{{ entrega[5] }}">
<input type="date" name="data_entrega" value="{{ entrega[6] }}">
<input type="number" step="0.01" name="valor" value="{{ entrega[7] }}">
<button>Salvar</button>
</form>

<a href="/">Voltar</a>

</div>
</div>

</body>
</html>
