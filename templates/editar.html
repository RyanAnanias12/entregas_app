<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar</title>
<style>
body { 
    font-family: Arial; 
    background: #1a1a1a; 
    color: #e0e0e0;
    margin: 0;
}

header {
    background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
    color: white;
    padding: 15px;
    text-align: center;
    border-bottom: 2px solid #2c7be5;
}

.container { 
    max-width: 500px; 
    margin:auto; 
    padding: 15px;
}

.card { 
    background: #2d2d2d; 
    padding:15px; 
    border-radius:10px;
    border: 1px solid #3d3d3d;
    box-shadow: 0 3px 8px rgba(0,0,0,0.5);
}

h3 {
    color: #e0e0e0;
}

label {
    color: #b0b0b0;
    display: block;
    margin-top: 8px;
}

input { 
    width:100%; 
    padding:10px; 
    margin:5px 0 10px 0;
    background: #1a1a1a;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 6px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #2c7be5;
    box-shadow: 0 0 0 2px rgba(44,123,229,0.3);
}

button { 
    width:100%; 
    padding:10px; 
    background: linear-gradient(135deg, #2c7be5, #1a5edb);
    color:white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    margin-top: 10px;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 12px rgba(44,123,229,0.4);
}

a {
    color: #2c7be5;
    text-decoration: none;
    display: block;
    margin-top: 10px;
    transition: 0.2s;
}

a:hover {
    color: #4a9eff;
}
</style>
</head>

<body>

<header>✏️ Editar Entrega</header>

<div class="container">
<div class="card">

<h3>Editar</h3>

<form method="post">

<label>Piloto</label>
<input name="piloto" value="{{ entrega.piloto }}">

<label>Acompanhante</label>
<input name="acompanhante" value="{{ entrega.acompanhante }}">

<label>Ponto de coleta</label>
<input name="ponto" value="{{ entrega.ponto_coleta }}">

<label>Hora de retirada</label>
<input type="time" name="retirada" value="{{ entrega.hora_retirada }}">

<label>Hora de finalização</label>
<input type="time" name="finalizacao" value="{{ entrega.hora_finalizacao }}">

<label>Data</label>
<input type="date" name="data_entrega" value="{{ entrega.data_entrega }}">

<label>Valor</label>
<input type="number" step="0.01" name="valor" value="{{ entrega.valor }}">

<button>Salvar</button>
</form>

<a href="/">← Voltar</a>

</div>
</div>

</body>
</html>
