<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Entregas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>


* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Arial;
    background: #f4f6f9;
}


header {
    background: linear-gradient(135deg, #2c7be5, #1a5edb);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
}

/* MENU */
.menu {
    background: #1a5edb;
    padding: 10px;
    display: flex;
    justify-content: space-around;
    color: white;
    font-size: 14px;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    overflow: hidden;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
}


.title {
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 16px;
}


input, select {
    width: 100%;
    padding: 11px;
    margin: 8px 0 15px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    transition: 0.2s;
}


input:focus, select:focus {
    outline: none;
    border-color: #2c7be5;
    box-shadow: 0 0 0 2px rgba(44,123,229,0.2);
}


button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #2c7be5, #1a5edb);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
}

/* BADGES */
.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    color: white;
}

.piloto { background: #28a745; }
.acomp { background: #6c757d; }

/* LISTA */
.entrega {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
    cursor: pointer;
    transition: 0.2s;
}

.entrega:hover {
    background: #f1f4ff;
}

.det-link {
    text-decoration: none;
    color: inherit;
}

</style>
</head>

<body>

<header>🚚 Entregas do Dia</header>

<div class="menu">
    <div>Total R$ {{ total_valor }}</div>
    <div>Rotas: {{ total_rotas }}</div>
    <div><a href="/historico" style="color:white;">Histórico</a></div>
</div>

<div class="container">

<!-- FORM -->
<div class="card">
<div class="title">Nova Entrega</div>

<form action="/add" method="post">

<label>Piloto</label>
<select name="piloto">
    <option>Ryan</option>
    <option>Felipe</option>
    <option>William</option>
    <option>Ruan</option>
</select>

<label>Acompanhante</label>
<select name="acompanhante">
    <option>Ryan</option>
    <option>Felipe</option>
    <option>William</option>
    <option>Ruan</option>
</select>

<label>Ponto de coleta</label>
<input type="text" name="ponto">

<label>Hora de retirada</label>
<input type="time" name="retirada">

<label>Hora de finalização</label>
<input type="time" name="finalizacao">

<label>Data</label>
<input type="date" name="data_entrega" value="{{ date.today() }}">

<label>Valor</label>
<input type="number" step="0.01" name="valor">

<button type="submit">Salvar</button>

</form>
</div>

<!-- LISTA -->
<div class="card">
<div class="title">Últimas 3 Entregas</div>

{% for e in entregas %}
<a href="/detalhes/{{ e[0] }}" class="det-link">
<div class="entrega">

<span class="badge piloto">{{ e[1] }}</span>
<span class="badge acomp">{{ e[2] }}</span><br>

📍 {{ e[3] }} <br>
⏰ {{ e[4] }} → {{ e[5] }} <br>
📅 {{ e[6] }} <br>
💰 R$ {{ e[7] }}

</div>
</a>
{% endfor %}

</div>

</div>

</body>
</html>
